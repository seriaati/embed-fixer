name: Bump Version

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Version bump level"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update version number
        uses: seriaati/update-ver-num@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          bump_type: ${{ github.event.inputs.level }}

      - name: Create release
        uses: seriaati/create-release@main

      # Tags pushed with GITHUB_TOKEN don't trigger workflows, so
      # dispatch the Docker build on the new tag explicitly
      - name: Trigger Docker build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags --quiet
          gh workflow run docker-build.yml --ref "$(git describe --tags --abbrev=0)"

# fly.toml app configuration file generated for embed-fixer-discord on 2026-05-31T16:16:36-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'embed-fixer-discord'
primary_region = 'gru'

[build]

[[mounts]]
  source = 'embed_fixer_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 0
  processes = ['app']


[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256



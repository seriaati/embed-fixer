disable_fix_channels: Danh Sách Đen Kênh Nhúng Sửa
disable_fix_channels_desc: "Chỉ các kênh được đặt ở đây sẽ không nhận được Nhúng Sửa, danh sách trắng được ưu tiên hơn danh sách đen."

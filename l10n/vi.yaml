info_embed_desc: |
  Bot này được làm bởi [@seria_ati](<discord://-/users/410036441129943050>) và là mã nguồn mở trên [GitHub](https://github.com/seriaati/embed-fixer).
  Nếu có thắc mắc hoặc vấn đề với bot này, hãy nhắn tin trực tiếp cho tôi trên Discord hoặc mở một vấn đề trên GitHub.
  Để đóng góp (chẳng hạn như bản dịch), hãy nhắn tin trực tiếp cho tôi hoặc mở một PR trên GitHub.

name: 繁體中文
replying_to: "⬅️ 回覆 {user} ({url})"
disable_fixes: 停用網站的連結預覽修復
disable_fixes_desc: 停用特定網站的連結預覽修復。
lang: 語言
lang_desc: 更改機器人的語言。
extract_media_channels: 媒體提取頻道
extract_media_channels_desc: 在這些頻道中發送的 Twitter/X/Pixiv 鏈接的圖片/影片將被提取。
disable_fix_channels: 連結預覽修復頻道黑名單
disable_fix_channels_desc: "這裡的頻道將不會接收連結預覽修復，白名單優先於黑名單。"
enable_fix_channels: 連結預覽修復頻道白名單
enable_fix_channels_desc: "僅在這裡設置的頻道將接收連結預覽修復，白名單優先於黑名單。"
disable_image_spoilers: 在 NSFW 頻道中禁用自動模糊
disable_image_spoilers_desc: "對於媒體提取功能，在這裡選擇的 NSFW 頻道內的媒體將不會被自動模糊。"
toggle_webhook_reply: 開關 Webhook 回覆
toggle_webhook_reply_desc: 開關回覆 Webhook 時對原始作者的提及。
sauce: 醬汁
settings_cmd_desc: 更改此伺服器的機器人設置
setting_param: 設置
setting_param_desc: 要更改的設置
info_cmd_desc: 獲取有關機器人的信息
info_embed_desc: |
  這個機器人由 [@seria_ati](<discord://-/users/410036441129943050>) 製作，並且在 [GitHub](https://github.com/seriaati/embed-fixer) 上開源。
  有關此機器人的問題或問題，請在 Discord 上與我聯繫，或在 GitHub 上提出 Issue。
  如有意願貢獻（例如翻譯），請與我聯繫，或在 GitHub 上提交 PR。
selected_channels: 已選擇的頻道
toggle_delete_reaction: 開關刪除訊息反應
toggle_delete_reaction_desc: "是否要為 Webhook 訊息新增表情符號反應，原訊息作者可以反應來刪除該訊息。"
show_post_content_channels: 顯示貼文內容頻道
show_post_content_channels_desc: "如果媒體提取已啟用，則在此處選擇的頻道將顯示貼文的內容。"
no_perms_to_delete_msg: 機器人缺少刪除訊息的權限
no_perms_to_manage_webhooks: 機器人缺少管理 Webhook 的權限
no_perms_to_add_reactions: 機器人缺少添加反應的權限
add_reaction_error: "無法添加反應 '{emoji}'，請確保它是有效的"
failed_to_send_webhook: 發送 Webhook 失敗
delete_msg_emoji: 變更刪除訊息反應表情符號
delete_msg_emoji_desc: "變更用於刪除訊息的表情符號。"
emoji: 表情符號
emoji_changed: "用於刪除訊息的表情符號已更改為 {emoji}"
choose_fix_service: 選擇連結預覽修復服務
choose_fix_service_desc: 選擇用於不同網站的連結預覽修復服務。
using_fix_service: "正在使用 {service}"
fix_embed: 修復連結預覽
extract_medias: 提取媒體
no_fixes_found: 找不到此訊息的連結預覽修復/媒體
bot_visibility: 機器人能見度
bot_visibility_desc: "啟用後，Embed Fixer 會修復來自其他機器人的連結預覽。如果停用，它將只修復來自使用者的連結預覽。"
funnel_target_channel: 引流目標頻道
funnel_target_channel_desc: "有設置的話，所有被修復的連結預覽和提取的媒體都會被發送至設置的頻道，而不是原訊息的頻道。"
whitelist_role_ids: 身份組白名單
whitelist_role_ids_desc: "如有設置值，則只有擁有這些身份組之一的使用者才會修復他們發送的連結預覽。留空則禁用。"
selected_roles: 已選擇的身份組
translang_disable: 關閉
translang_set: "此伺服器的翻譯目標語言已設置為 {lang_name}"
invalid_translang: 選擇了無效的語言
translang_param: 目標語言
translang_param_desc: 目標語言
translang_cmd_desc: 變更貼文內文翻譯的目標語言
translang_disabled: 已停用貼文內容翻譯
reset_cmd_desc: 將此伺服器的所有設置還原至預設值
reset_confirm: "你確定要重設此伺服器的所有設置嗎？"
reset_yes: "確認"
reset_done: 所有設置已被還原為預設值
original_link: 原連結
show_original_link_btn: 開關原連結按鈕
show_original_link_btn_desc: "是否要在修復訊息的下方顯示前往原貼文連結的按鈕。"
recommend_original_link_btn: 推薦在 /settings 中啟用「原連結按鈕」，因為此修復網站帶有廣告。
ignore_me_enabled: 從現在起，機器人將不再忽略你的訊息，你的連結預覽將會被修復。
ignore_me_disabled: 從現在起，機器人將忽略你的訊息，你的連結預覽將不會被修復。
ignore_me_cmd_desc: 開關 Embed Fixer 是否要忽略你的訊息
delete_original_message_in_threads: 開關是否要再討論串中刪除原訊息
delete_original_message_in_threads_desc: "由於討論串中不能有 Webhook，原訊息將被保留，以用於展示誰傳送了原本的訊息。開啟此選項將在討論串中修復連結預覽後刪除原訊息。"
fix_url_command_desc: 修復一個連結的連結預覽
fix_url_param: 連結
fix_url_param_desc: 要修復的連結
fix_url_extract_media_param: 提取媒體
fix_url_extract_media_param_desc: "是否要從連結中提取媒體（預設：不提取）"
notify_on_react: 獲得表情符號反應時通知
notify_on_react_desc: "機器人是否要在你的已修復訊息獲得一個表情符號反應時通過私訊通知你。"
notify_on_react_msg: "{user}對你的訊息反應了{emoji} ({message_link})"
user_settings_cmd_desc: 變更你在機器人的個人設置
reply_instead_of_delete: 以回覆代替刪除
reply_instead_of_delete_desc: "若啟用，機器人將在修復訊息時回覆你的訊息，而非刪除訊息並通過 webhook 重新發送修復。"
